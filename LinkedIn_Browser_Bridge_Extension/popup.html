<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Bridge</title>
  <style>
    body { width: 420px; margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e5e7eb; }
    .wrap { padding: 14px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { color: #94a3b8; font-size: 13px; line-height: 1.4; }
    button { width: 100%; margin: 6px 0; padding: 10px; border: 0; border-radius: 10px; cursor: pointer; font-weight: 700; }
    .primary { background: #38bdf8; color: #06121f; }
    .green { background: #22c55e; color: #052e16; }
    .secondary { background: #334155; color: #e5e7eb; border: 1px solid rgba(148,163,184,.3); }
    textarea, input { width: 100%; box-sizing: border-box; margin: 6px 0; border-radius: 8px; border: 1px solid rgba(148,163,184,.35); background: #020617; color: #dbeafe; padding: 8px; }
    textarea { height: 150px; resize: vertical; }
    .box { border: 1px solid rgba(148,163,184,.25); background: rgba(30,41,59,.7); border-radius: 12px; padding: 10px; margin-top: 8px; }
    .score { font-size: 22px; font-weight: 800; color: #86efac; }
    .small { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>LinkedIn Automation Bridge</h1>
    <p>Open a LinkedIn job/post/company page in your normal Chrome, then click analyze. It only reads visible page text from the current tab.</p>
    <button id="analyze" class="primary">Analyze Current LinkedIn Page</button>

    <div class="box">
      <label class="small">Company name guess/edit</label>
      <input id="company" placeholder="Company name" />
      <div id="summary" class="small">No page analyzed yet.</div>
    </div>

    <textarea id="output" placeholder="Analysis output will appear here..."></textarea>
    <button id="copyCsv" class="green">Copy CSV Row</button>
    <button id="copyReport" class="secondary">Copy Report Text</button>
    <button id="downloadJson" class="secondary">Download JSON</button>
    <p class="small">Tip: paste the CSV row into your Google Sheet or import data into the HTML tool.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
